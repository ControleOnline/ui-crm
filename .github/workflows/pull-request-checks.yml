name: Pull Request Checks

on:
  pull_request:
  push:
    branches:
      - task-43

jobs:
  crm-empty-state:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run CRM empty-state test
        run: npm run test:crm-empty-state
