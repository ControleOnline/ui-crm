name: Pull Request Checks

on:
  pull_request:
  push:
    branches:
      - task-*

jobs:
  proposal-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm run test:proposal-status
